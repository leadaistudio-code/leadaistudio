<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200" role="img" aria-label="LeadAIStudio logo">
  <title>LeadAIStudio</title>
  <desc>Animated rotating 3D cube logo for LeadAIStudio</desc>
  <g style="transform-origin: 50px 50px; animation: spin 12s linear infinite;">
    <polygon points="50,20 80,35 80,65 50,80 20,65 20,35" fill="#7F77DD" opacity="0.9"/>
    <polygon points="50,20 80,35 50,50 20,35" fill="#378ADD"/>
    <polygon points="20,35 50,50 50,80 20,65" fill="#1D9E75"/>
    <polygon points="80,35 50,50 50,80 80,65" fill="#7F77DD"/>
  </g>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</svg>
